databaseChangeLog:
  - changeSet:
      id: 1
      author: Alexsandr
      changes:
        - createTable:
            tableName: patients
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: VARCHAR(100)
              - column:
                  name: birth_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: gender
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: VARCHAR(20)
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    unique: true
  - changeSet:
      id: 2
      author: Alexsandr
      changes:
        - sql:
            sql: ALTER TABLE patients ADD CONSTRAINT ck_patient_gender CHECK (gender IN ('MALE', 'FEMALE'))